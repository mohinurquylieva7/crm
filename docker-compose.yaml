services:
  crm:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - crm-data:/app/data
    environment:
      - DATABASE_URL=sqlite:///./data/crm.db
      - SECRET_KEY=${SECRET_KEY:-crm-production-secret-key-2024}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8010/docs')"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  crm-data:

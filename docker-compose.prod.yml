name: educrm-prod

x-restart: &restart
  restart: always

x-logging: &logging
  logging:
    driver: json-file
    options:
      max-size: "10m"
      max-file: "3"

services:
  # ── PostgreSQL ─────────────────────────────────────────────────
  db:
    <<: [*restart, *logging]
    image: postgres:15-alpine
    container_name: educrm_db
    environment:
      POSTGRES_DB: educrm_db
      POSTGRES_USER: educrm_user
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U educrm_user -d educrm_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
    networks:
      - internal

  # ── Redis ──────────────────────────────────────────────────────
  redis:
    <<: [*restart, *logging]
    image: redis:7-alpine
    container_name: educrm_redis
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: "0.3"
          memory: 128M
    networks:
      - internal

  # ── Backend API ────────────────────────────────────────────────
  api:
    <<: [*restart, *logging]
    build:
      context: Backend
      dockerfile: Dockerfile
      target: runner
    image: educrm-api:latest
    container_name: educrm_api
    env_file: /opt/educrm/.env
    environment:
      - DB_PASSWORD=${DB_PASSWORD}
    expose:
      - "8000"
    volumes:
      - /opt/educrm/media:/app/media
      - /opt/educrm/logs:/app/logs
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          cpus: "0.9"
          memory: 768M
        reservations:
          cpus: "0.25"
          memory: 256M
    networks:
      - internal
      - proxy

  # ── Frontend (React SPA via nginx) ────────────────────────────
  frontend:
    <<: [*restart, *logging]
    build:
      context: Frontend
      dockerfile: Dockerfile
    image: educrm-frontend:latest
    container_name: educrm_frontend
    expose:
      - "80"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:80/"]
      interval: 30s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: "0.3"
          memory: 64M
    networks:
      - proxy

  # ── Nginx reverse proxy (SSL termination) ─────────────────────
  nginx:
    <<: [*restart, *logging]
    image: nginx:1.27-alpine
    container_name: educrm_nginx
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      api:
        condition: service_healthy
      frontend:
        condition: service_healthy
    volumes:
      - /opt/educrm/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - /opt/educrm/media:/var/www/media:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - /var/www/certbot:/var/www/certbot:ro
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 64M
    networks:
      - proxy

volumes:
  pgdata:
  redisdata:

networks:
  internal:
    driver: bridge
  proxy:
    driver: bridge

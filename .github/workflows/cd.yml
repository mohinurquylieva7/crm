name: CD — Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: cd-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to production
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment:
      name: production
      url: https://crm-ux.duckdns.org

    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          if [ -z "${{ secrets.SSH_PRIVATE_KEY }}" ]; then
            echo "ERROR: SSH_PRIVATE_KEY secret not set!"
            exit 1
          fi
          if [ -z "${{ secrets.SSH_HOST }}" ]; then
            echo "ERROR: SSH_HOST secret not set!"
            exit 1
          fi
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "${{ secrets.SSH_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Copy nginx config
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
            "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}" \
            "mkdir -p /opt/educrm && chmod 755 /opt/educrm"
          
          scp -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
            nginx/nginx.conf \
            "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:/opt/educrm/"

      - name: Deploy on server
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
        run: |
          GIT_TOKEN="${{ secrets.GHCR_TOKEN }}"
          CLONE_URL="https://mohinurquylieva7:${GIT_TOKEN}@github.com/mohinurquylieva7/crm.git"

          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
            "${SSH_USER}@${SSH_HOST}" bash -s -- "$CLONE_URL" << 'ENDSSH'
            set -euo pipefail
            CLONE_URL="$1"
            REPO_DIR="/opt/educrm/repo"
            APP_DIR="/opt/educrm"

            echo "=== [1/5] Repo yangilash ==="
            if [ -d "$REPO_DIR/.git" ]; then
              cd "$REPO_DIR"
              git remote set-url origin "$CLONE_URL"
              git fetch origin main
              git reset --hard origin/main
            else
              git clone "$CLONE_URL" "$REPO_DIR"
            fi
            cd "$REPO_DIR"

            echo "=== [1b] SSL sertifikat (crm-ux.duckdns.org) ==="
            if [ ! -d "/etc/letsencrypt/live/crm-ux.duckdns.org" ]; then
              docker stop educrm_nginx 2>/dev/null || true
              certbot certonly --standalone --non-interactive --agree-tos \
                --email sahmadjonov782@gmail.com -d crm-ux.duckdns.org
              echo "SSL olindi"
            else
              echo "SSL allaqachon mavjud"
            fi

            echo "=== [1c] .env ALLOWED_ORIGINS yangilash ==="
            sed -i 's|ALLOWED_ORIGINS=\["https://edu\.crm\.ozodbekme\.dev"\]|ALLOWED_ORIGINS=["https://crm-ux.duckdns.org"]|' /opt/educrm/.env 2>/dev/null || true
            grep ALLOWED_ORIGINS /opt/educrm/.env || true

            echo "=== [2/5] Docker build ==="
            DB_PASSWORD=$(grep DB_PASSWORD "$APP_DIR/.env" | cut -d= -f2)
            export DB_PASSWORD
            docker compose -f docker-compose.prod.yml build --parallel

            echo "=== [3/5] Konteynerlar ishga tushirish ==="
            docker compose -f docker-compose.prod.yml down 2>/dev/null || true
            docker compose -f docker-compose.prod.yml up -d --remove-orphans

            echo "=== [4/5] Migrations ==="
            sleep 8
            docker exec educrm_api alembic upgrade head

            echo "=== [5/5] Health check ==="
            sleep 5
            for i in 1 2 3 4 5; do
              if curl -sf http://localhost:8000/health; then
                echo "Health OK (try ${i})"
                break
              fi
              echo "Waiting... (${i}/5)"
              sleep 8
            done

            docker image prune -f --filter "until=24h" 2>/dev/null || true
            echo "Deploy muvaffaqiyatli: $(date)"
          ENDSSH

      - name: Summary
        if: always()
        run: |
          echo "## Deploy #${{ github.run_number }}" >> $GITHUB_STEP_SUMMARY
          echo "| | |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| URL | https://crm-ux.duckdns.org |" >> $GITHUB_STEP_SUMMARY
          echo "| API Docs | https://crm-ux.duckdns.org/docs |" >> $GITHUB_STEP_SUMMARY

  notify-failure:
    name: Notify on failure
    runs-on: ubuntu-latest
    needs: [deploy]
    if: failure()
    steps:
      - run: |
          echo "## Deploy muvaffaqiyatsiz!" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "**Rollback:** \`git revert HEAD && git push\`" >> $GITHUB_STEP_SUMMARY

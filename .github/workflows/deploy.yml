name: CI/CD — Test & Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─── Stage 1: Test ───────────────────────────────────────
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Install dependencies
        run: uv pip install --system --no-cache -r requirements.txt

      - name: Run tests
        run: pytest tests/ -v --tb=short

  # ─── Stage 2: Deploy (only on push to main, after tests pass) ─
  deploy:
    runs-on: ubuntu-latest
    needs: [test]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Clean build artifacts
        run: |
          rm -rf .git .github
          rm -rf .pytest_cache __pycache__ *.pyc
          rm -rf app/__pycache__ app/*.pyc
          rm -rf tests/__pycache__ tests/*.pyc
          rm -f .gitignore .gitattributes .env
          find . -name "*.pyc" -delete
          find . -name "__pycache__" -type d -exec rm -rf {} + 2>/dev/null || true
          rm -f test.db crm.db
          echo "=== Files to deploy ==="
          ls -la

      - name: Copy files to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "."
          target: "/home/${{ secrets.SSH_USER }}/crm-api"
          overwrite: true

      - name: Deploy with Docker Compose
        uses: appleboy/ssh-action@v1.0.3
        env:
          SECRET_KEY: ${{ secrets.SECRET_KEY }}
          DOMAIN: ${{ secrets.DOMAIN }}
          ADMIN_EMAIL: ${{ secrets.ADMIN_EMAIL }}
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: SECRET_KEY,DOMAIN,ADMIN_EMAIL
          script: |
            set -e
            cd /home/${{ secrets.SSH_USER }}/crm-api

            # Create required directories
            mkdir -p certbot/{conf,www}

            # Create .env from secrets
            cat > .env << EOF
            SECRET_KEY=${SECRET_KEY}
            DOMAIN=${DOMAIN}
            ADMIN_EMAIL=${ADMIN_EMAIL}
            DATABASE_URL=sqlite:///./data/crm.db
            LOG_LEVEL=INFO
            DEBUG=false
            EOF
            sed -i 's/^[[:space:]]*//' .env
            chmod 600 .env

            # Use docker-compose (V1) or docker compose (V2)
            if command -v docker-compose &> /dev/null; then
              DC="docker-compose"
            else
              DC="docker compose"
            fi

            # Build and deploy WITHOUT destroying volumes (preserves data!)
            $DC up -d --build --force-recreate

            # Wait for CRM container to be ready
            echo "=== Waiting for CRM to start... ==="
            sleep 8

            # Health check — verify the app is responding
            echo "=== Running health check ==="
            for i in 1 2 3 4 5; do
              if $DC exec -T crm python -c "import urllib.request; urllib.request.urlopen('http://localhost:8000/docs')" 2>/dev/null; then
                echo "=== ✅ Health check passed ==="
                break
              fi
              if [ "$i" -eq 5 ]; then
                echo "=== ❌ Health check failed after 5 attempts ==="
                $DC logs --tail=30
                exit 1
              fi
              echo "Attempt $i failed, retrying in 5s..."
              sleep 5
            done

            # Conditionally enable SSL if certs exist
            if [ -f "certbot/conf/live/crm-uz.duckdns.org/fullchain.pem" ]; then
              echo "=== SSL certs found, enabling HTTPS ==="
              docker cp nginx-ssl.conf nginx:/etc/nginx/conf.d/ssl.conf
              $DC exec -T nginx nginx -s reload
              echo "=== HTTPS enabled ==="
            else
              echo "=== No SSL certs yet, running HTTP only ==="
              echo "=== Run setup-ssl.sh on the server to obtain certs ==="
            fi

            # Show status
            echo ""
            echo "=== Container Status ==="
            $DC ps
            echo ""
            echo "=== Recent Logs ==="
            $DC logs --tail=10

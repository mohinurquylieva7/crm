name: CD — Deploy to Server

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    needs: []

    steps:
      - uses: actions/checkout@v4

      - name: Clean unnecessary files before deployment
        run: |
          rm -rf .git .github
          rm -rf .pytest_cache __pycache__ *.pyc
          rm -rf app/__pycache__ app/*.pyc
          rm -rf tests/__pycache__ tests/*.pyc
          rm -f .gitignore .gitattributes
          find . -name "*.pyc" -delete
          find . -name "__pycache__" -type d -exec rm -rf {} + 2>/dev/null || true
          ls -la

      - name: Copy files to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "."
          target: "/home/${{ secrets.SSH_USER }}/crm-api"
          overwrite: true

      - name: Deploy with Docker Compose
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            cd /home/${{ secrets.SSH_USER }}/crm-api
            
            # Create required directories
            mkdir -p certbot/{conf,www}
            
            # Stop existing services
            docker-compose down -v || true
            
            # Start services with build
            docker-compose up -d --build
            
            # Wait for services to start
            sleep 5
            
            # Check status
            docker-compose ps
            
            # Show logs
            docker-compose logs --tail=20

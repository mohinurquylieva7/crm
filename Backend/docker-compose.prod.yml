version: "3.9"

# Production override — faqat server da ishlatiladi
# Local dev uchun: docker-compose.yml
# Ishga tushirish: docker-compose -f docker-compose.prod.yml up -d

x-restart-policy: &restart-policy
  restart: always

x-logging: &default-logging
  logging:
    driver: "json-file"
    options:
      max-size: "10m"
      max-file: "3"

services:
  api:
    <<: [*restart-policy, *default-logging]
    image: ${REGISTRY:-registry.digitalocean.com}/${IMAGE_NAME:-educrm/api}:${IMAGE_TAG:-latest}
    container_name: educrm_api
    env_file: /opt/educrm/.env
    ports:
      - "8000:8000"
    volumes:
      - /opt/educrm/media:/app/media
      - /opt/educrm/logs:/app/logs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          cpus: "1.5"
          memory: 768M
        reservations:
          cpus: "0.25"
          memory: 256M
    ulimits:
      nofile:
        soft: 65535
        hard: 65535

  nginx:
    <<: [*restart-policy, *default-logging]
    image: nginx:1.27-alpine
    container_name: educrm_nginx
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      api:
        condition: service_healthy
    volumes:
      - /opt/educrm/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - /opt/educrm/media:/var/www/media:ro
      - /opt/educrm/ssl:/etc/nginx/ssl:ro
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 128M
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "3"
